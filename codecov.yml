ignore:
  - "**/generator/main.go" # generator tools usually involves writing files
  - "**/*.gen.go" # generated files from go generate
  # rxprefilter.go is only compiled with -tags coraza.rule.rx_prefilter.
  # Untagged coverage runs produce 0% for this file, which is misleading.
  # Coverage for these files is captured in the rx_prefilter matrix entry.
  - "internal/operators/rxprefilter.go"
  - "internal/operators/rxprefilter_test.go"
  - "internal/operators/rxprefilter_crs_test.go"
  - "internal/operators/bench_compare_test.go"
fixes:
  # Apparently using build/ as prefix is not enough to ignore the directory
  # Reference: https://community.codecov.com/t/codecov-website-can-not-show-line-by-line-coverage/3809
  - "build/::" 