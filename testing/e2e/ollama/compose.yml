# testing/e2e/ollama/compose.yml
services:
  ollama:
    # ⚠️ Replace tag with pinned digest before merging:
    # docker pull ollama/ollama:latest && docker inspect --format='{{index .RepoDigests 0}}' ollama/ollama:latest
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/version"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  ollama_models:
