# testing/e2e/ollama/compose.yml
services:
  ollama:
    image: ollama/ollama@sha256:fbaaecc6c632a73c2b4ca25ef52dbee0b68d07783fcb850f916404c004040f90
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/version"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  ollama_models:
